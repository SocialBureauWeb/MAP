worker_processes 1;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        application live {
            live on;
            record off;
            exec c:/Users/webas/MAP/tools/ffmpeg/ffmpeg.exe -i rtmp://localhost/live/stream -c:v libx264 -c:a aac -f hls -hls_time 4 -hls_list_size 5 c:/Users/webas/MAP/storage/hls/stream.m3u8;
        }
    }
}

http {
    server {
        listen 8080;
        location /hls {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Expose-Headers Content-Length,Content-Range;
            add_header Access-Control-Allow-Headers Range;
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            alias c:/Users/webas/MAP/storage/hls/;
        }
    }
}